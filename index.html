<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather App</title>
  <link rel="stylesheet" href="./style .css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
  <section class="side-bar">
    <div class="header">
      <!-- <h1 id="temp"></h1>
      <p id="condition"></p>
      <span id="city"></span> -->
      <img id="rainbow-image" src="./Assests/v1015-018-removebg-preview.png" alt="Rainbow-Image">
      <h2>
        Weather App
      </h2>
    </div>
    <hr style=" height: 2px; background: rgba(255,255,255,0.1);">
    <div class="favorites">
      <div class="location-card">
        <i class="fa-solid fa-location-dot"></i>
        <div class="location-text">
          <p class="city">Wanchaq</p>
          <span class="country">
            Cusco, Peru
          </span>
        </div>
      </div>
      <h3>My Favorites</h3>
      <!-- <div class="fav-item">
        Wellington
        <span>New Zealand</span>
      </div>

      <div class="fav-item">
        Vadodara
        <span>India</span>
      </div>

      <div class="fav-item">
        Tokyo
        <span>Japan</span>
      </div>

      <div class="fav-item">
        Florida
        <span>USA</span>
      </div>
    </div> -->

    <!-- Add Button -->
    <button class="add-btn" onclick="openModal()" >+ Add New</button>
    </div>
  </section>
  <section class="main">

    <div class="weather-info">
      <h1 class="temp" id="temp">10°C</h1>
      <p class="condition" id="condition">Clear sky</p>
      <span class="main-city" id="city">Wanchaq</span>
    </div>

    <div class="weather-icon">
      🌙
    </div>
    <div class="hourly">

      <div class="hour-card">
        <p>7 AM</p>
        <div class="dot"></div>
        <span>7°</span>
      </div>

      <div class="hour-card">
        <p>8 AM</p>
        <div class="dot"></div>
        <span>7°</span>
      </div>

      <div class="hour-card">
        <p>9 AM</p>
        <div class="dot"></div>
        <span>8°</span>
      </div>

      <div class="hour-card">
        <p>10 AM</p>
        <div class="dot"></div>
        <span>10°</span>
      </div>

    </div>

  </section>

  <section class="right-panel">

    <div class="day-card">
      <p>May 25, Sat</p>
      <span>17°C / 4°C</span>
      <i class="fa-solid fa-cloud"></i>
    </div>

    <div class="day-card">
      <p>May 26, Sun</p>
      <span>17°C / 5°C</span>
      <i class="fa-solid fa-cloud"></i>
    </div>

    <div class="day-card">
      <p>May 27, Mon</p>
      <span>18°C / 4°C</span>
      <i class="fa-solid fa-cloud"></i>
    </div>

    <div class="day-card">
      <p>May 28, Tue</p>
      <span>17°C / 5°C</span>
      <i class="fa-solid fa-cloud"></i>
    </div>

  </section>
  <div class="modal" id="modal">

    <div class="modal-content">
        <h3>Add City</h3>

        <input type="text" id="cityInput" placeholder="Enter city">

        <p id="countryResult"></p>

        <button onclick="addCity()">Add</button>
        <button onclick="closeModal()">Cancel</button>
    </div>

</div>
  <script src="./script.js"></script>
</body>

</html>
