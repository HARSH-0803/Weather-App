<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather App</title>
  <link rel="stylesheet" href="./style .css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
  <section class="side-bar">
    <div class="header">
      <img id="rainbow-image" src="./Assests/v1015-018-removebg-preview.png" alt="Rainbow-Image">
      <h2>
        Weather App
      </h2>
    </div>
    <hr style=" height: 2px; background: rgba(255,255,255,0.1);">
    <div class="favorites">
      <div class="location-card">
        <i class="fa-solid fa-location-dot"></i>
        <div class="location-text">
          <p class="city">Wanchaq</p>
          <span class="country">
            Cusco, Peru
          </span>
        </div>
      </div>
      <h3>My Favorites</h3>

      <div class="fav-item">
        Wellington
        <span>New Zealand</span>
      </div>

      <div class="fav-item">
        Vadodara
        <span>India</span>
      </div>

      <div class="fav-item">
        Tokyo
        <span>Japan</span>
      </div>

      <div class="fav-item">
        Florida
        <span>USA</span>
      </div>
    </div>

    <!-- Add Button -->
    <button class="add-btn">+ Add New</button>
    </div>
  </section>
  <section class="main">

    <div class="weather-info">
        <h1 class="temp">10°C</h1>
        <p class="condition">Clear sky</p>
        <span class="main-city">Wanchaq</span>
    </div>

    <div class="weather-icon">
        🌙
    </div>

</section>
  <script src="./script.js"></script>
</body>

</html>
